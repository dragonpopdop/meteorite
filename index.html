                        title: "Chapter 1: Earrings",
                        content: `Discipline is considered one of the strongest things to learn to truly survive in the world, but some people are just naturally gifted to not need discipline, and that's what makes the world seem unfair. Life can be super unfair; this is why I believe the goal of every human is to make the unfair world work in their favor. - Probably someone

After getting fired from every job imaginable, I realize that I may need to start developing at least a small amount of discipline.
“Man walking is so annoying, why am I even doing thi-” I say before being cut off by a piece of paper landing next to me, “HELP WANTED
Detective wanted for the Seattle Police Department, looking for TOP detectives, willing to pay $140,000 a year.” Well the wages are pretty good, but a detective job is way too much effort, I couldn’t even take orders. This is also way too convenient, almost like a writer was too lazy to come up with good foreshadowing or something.

“SOMEONE STOP HIM” A woman screamed in the distance. I saw a woman get her diamond studded purse stolen, but it's strange how someone who clearly has money had zero self defense items, whatever.
“Hey, do you need help?” I ask her, “YES PLEASE, THAT MAN STOLE MY PURSE” she responds loudly. Well that much was obvious, but I guess I should be kind. “Ill try my hardest to find him.” I forced myself to sound proud to say, “thank you so much sir” wow she lost that fear pretty fast, whatever, I’m bored anyway.

Sadly I wasn’t able to see what the thief looked like, nor what they were wearing, yet I’m sure a thief will stand out pretty well, but I don’t have the time to look around so lets narrow it down a little.
Considering the purse is diamond studded and it is a very sunny day, I am very sure that it would have at least a small glint, since the thief is more likely to be in the shadows, I just need to look there and wait for a shine.
After a few minutes I see a guy on his phone with a diamond studded purse, of course that could just be his purse, but it doesn’t fit him too well.
Strangely enough, he gave me the purse without any conflict. “here is your purse ma’am” I said proudly, “thank you so much, if I may ask, what is your name?” she doesn’t seem too happy about getting her purse back, almost like it didn’t matter. “My name is Cid Law, how about you?” I asked trying to be nice, I really couldn’t care less about her name, “luluana first, but you can call me lulu” she said with a sweet look, “Well I gotta get going, Cya!” I say before jogging off. I really hope I don’t see her again.

Getting home was pretty normal aside from me forgetting to get my jacket when I got fired, of course it rained because the universe hates me, but I like the rain.
I pretty much slept through the next day since I had no plans on job hunting, but the next day, I got a knock on my door “We are with the SPD, please open the door immediately” Considering I haven’t committed any crimes, and I have no criminal record, I opened the door in confusion, and that was the worst mistake I have ever made in my life.

“We are with the SPD, and you have been recommended to join the SPD ace detective union” the very obvious leader said to me, “Who would recommend me?” Normally I ask questions to seem nice, but I have no idea who could’ve possibly recommended me, and had enough power for me to get accepted with no prior experience with detective work, “That much cannot be told, if you do not come with us, then your house will be claimed” well that completely counters every single plan, so I might as well decline them once I’m there. “Okay just give me a moment”. As I close the door, I realize that I could really go for a snack, and as long as I go eventually, I can probably spend as much time as I need.

After 24 minutes of them waiting, “Hello, Cid are you there?” I see, they know my name and address, clearly this is the real deal. “Yeah, sorry, I am ready now”
As we drive to the SPD detective HQ, I realize that I have never been this way a single moment in my life, but my location is the least of my concerns. I am basically being abducted because some random person decided that I would be the perfect detective. Could it have been luluana?
After arriving to the HQ, I am greeted with 3 people aside from my kidnappers.

“Welcome to the HQ, my name is Charlotte Mincer” says Charlotte, “Hello, my name is Arya Cyan” said Arya, “Hello, my name is Oswald”, said four eyes, “Uh, hi, my name is cid, why am I here?” I asked. “You still don’t know, I thought this kid was supposed to be the one to outsmart everyone here?” said Oswald.
“Trust me he is” said one of the officers that brought me in, “can I just know why I’m here?” I asked.
“You are here because you are considered one of the smartest college students in Seattle, and our boss has decided that you will be working for our detective group” said Charlotte, “so, I am being forced to work here, and to make sure I don’t decide to leave, you are abusing government power to take away my estate?” I asked, “almost, we aren’t abusing government power, that whole taking your house thing was a lie, but if you leave then we will make sure you won’t ever have the ability to get a job” said Charlotte.
“That sound a lot like abusing governmental power” I say, “Who cares, you are getting paid way more than the average American, just accept it” aggressively said by Arya, “Calm down Arya” Charlotte said, this seemed like a pretty stupid group of people, but they seem to have a good understanding of things.
I seriously don’t want this job, it’s everything I hate: effort, communication, and using knowledge, but I need to take it since this is my only option. “Alright, I accept, so what do I do?”
“Just follow me” said a guy in a mask, and this was the day I became a detective, the worst detective known to man.

                        title: "Chapter 2: Schrodinger's Murder",
                        content: `The world may assume a lie is a lie, but what if a lie is just the lack of knowledge. If everyone lacks knowledge, the knowledge is deemed as non-existent. The lie you tell may be the truth 10 years from now. - Probably someone

I tried to get some sleep that day, but the constant phone calls and talking prevented that. It seems like something keeps happening every day, but what could be causing such a big impact so often. "Cid, you are needed in the advisory office." Charlotte tells me

As expected, I have to pass a test to actually get the role as an ace detective, of course I could just completely fail, but it's obvious they wouldn’t accept that.
“Hello Cid, you shall begin in this detective case that has never been solved by a beginning ace detective.” a man tells me as he takes me into the room with all the evidence. It’s pretty obvious that no one is actually paying attention to see how I do. Pretty unprofessional, but it just removes the "pressure".
“You have 30 minutes, good luck. All suspects are listed on the paper of clues you were given”.
I am in a completely empty room with only 1 source of light, and a piece of paper

“Is this a real case or simulated?” I ask. “This is a real solved case meant specifically for newcomers to resolve, but our team has already solved it. This case has never been released.” he says. 
The sheet of paper had some pretty useful information,
A suspect list:

 “Dr. Aris: Claims he was in the lab. He smells faintly of ozone.
Detective Miller: Claims she was in the viewing gallery. She has a bandage on her index finger.
Elena: Claims she was at the opera. She has a digital ticket stub on her phone, timestamped for the duration of the "murder."
Sloane: Claims he was filing papers. He is wearing high-end noise-canceling headphones.
Marcus: Claims he was monitoring the cameras. He mentions the feed "flickered" at the moment of death.”

Those clues are completely useless considering the case is completely fake, but some useful clues I gathered from the photo given:

"The Victim is dead in a soundproof, pressurized glass observation chamber. The door is locked from the inside.
The Pressure Gauge: The chamber’s internal pressure is 1.2 atm, higher than the 1.0 atm in the hallway.
The "Blood" Pattern: The blood spray on the wall is perfectly horizontal.
The Polarized Lens: A small, discarded camera filter is found near the vent; it is a circular polarizer.
The Audio Log: A recording captures a loud "bang" followed by 30 seconds of absolute silence—no heartbeat, no breathing, no rustling.


The Thermal Signature: The victim’s body temperature is 25°C (77°F),


I was also told the body was 94°F. This seems like it’s meant to be a really hard case to solve, but that hint just gave away the answer.
The "body" you see in the photo is a high-fidelity medical dummy. I have no reason to assume it was anyone except for Sloane. Wearing noise canceling headphones isn’t completely guilty, but that’s because he isn’t guilty.
If someone supposedly died, then his body wouldn’t be 94 degrees which is way above the temperature for a dead body, furthermore, the blood spray being so perfect is obviously a sign that it was painted on there.
I have no reason to believe that someone actually died, which means that this is clearly not a real case.
Surprising that they have a trick test like this on my first day, but if this job is meant for the most advanced detectives it makes sense.

“Sir, I have my answer. I believe that the murder didn’t occur yet.” I say. This is a pretty complex trick question, and it isn't suprising that most wouldn't get this correct. “Hm, what gave you that conclusion?” the instructor says.

“It’s honestly really simple, I just didn’t feel like engaging in the test, so if I didn’t see the murder, it didn’t happen!” I said, “Absolute genius, almost like we hired an undergraduate to work for us!” said Oswald, the instructor silenced Oswald. “If you truly think about my reasoning, it's pretty smart. The best discoveries come by accident, so obviously my gut feeling of laziness would assist in that. Also I am an undergraduate.” I say proudly.
“I really wanted to vouch for you, but even your gut answer made no sense. The instructor clearly says that this is a real case, and why would it be a case if no one was murdered?” said Charlotte questioning every word I said.

“Enough, Cid’s deduction was correct.” the instructor says, everyone had a shocked expression, almost like I’ve never done anything logical before in my life.
“This has to be a joke, this idiot had the worst reasoning, the answer has zero logic, even a zoo animal could come up with a better answer than that.” said Oswald.

I get the anger they are feeling, considering these are the best detectives, and they couldn’t figure out that it was a trick question; I would be pretty mad too. “This isn’t a joke Oswald, and I would be grateful if you all would stop blurting out. I do understand that his reasoning is very flawed and he had zero grounds to stand on, but the fact that he was correct is the only factor here. I said the case was real, but I never said the case had an actual murder.” said the instructor.

I am surprised that they can come up with something to defend me, clearly they are actually attempting to keep me from escaping. “This will be your room from now on.” said one of the many servants.

After a whlie of sitting around I heard a knock on my door, "Hey Cid, I have a quick question." Ayra asked me after walking in without permission. "How did you know that the case had no actual murder?" Ayra followed up. "I didn't. Like I said, it was just a gut feeling" I responded. "I feel like you aren't telling me everything, but I'll believe you for now. Goodbye Ciddy!" Ayra said before leaving my room with the door open. 

This room is very nice, but I think a few improvements could make it even better. One of those improvements would be a way to quit.
`

                        content: `Indirect winning can be seen as more powerful than direct winning. Having the ability to recover from a fail so well isn't something to be looked over. - Somebody probably

After that exam I was put onto my first case with a fellow ace detective, Charlotte.
“Geez, when are we going to reach this stupid tower?” I said annoyingly.
“Shortly.” Charlotte responded.
“Well why is it only us, what about the entire rest of the team?” I said
“This case is relatively simple, no need to give them extra work.” Charlotte responded.
“Then why am I being brought here?” I asked. “Because you need on the job experience, please stop asking so many questions. When we get there you are going to say nothing and listen, I will do all of the questioning. Take note on everything I do” Charlotte responded.

This felt more like another abduction, but I can’t complain considering how bored I was prior to being dragged into this. As we drove by I noticed a lot of trash and confetti on the ground, seems like a large event happened.

After a hellishly dull 5 hour drive we arrived at “Snouts spike”, a pretty boring looking tower made for creating large amounts of dog treats.
A thief stole 3 million dollars worth of dog treats, and we are the detectives that are meant to find out who and how someone managed to steal such a large amount.
I would be lying if I said I didn’t wonder how an entire company managed to lose 3 million dollars worth of dog treats without noticing until it was too late.

“So when exactly did this robbery occur?” Charlotte asked.
“I’m pretty sure it was a few hours before we opened, our cameras turned off for maintenance right before we opened.” the worker responded
“What time do you open, I am assuming 6 AM?” Charlotte asked.
“You would be correct, we open at 6 AM and the cameras turn off at 4 AM, then turn back on at 5 AM” the worker responded.

Sadly I was told to keep quiet, but I had a few theories on the idea behind the crime.

“Would anyone have access to the factory within that timeframe?” Charlotte asked.
“Yes!” The worker responded quickly, “Every trusted worker has a keycard that allows them to enter and leave at any time for safety reasons, but no keycard usage was logged any time during the night.” the worker responded nervously.
"That was my only idea for a lead. We will search around and ask questions if needed” Charlotte said.

Judging by the way the worker answered, I seriously doubt he was lying. It is kinda strange that no keycard usage was logged within those hours, that means that the person never used the keycard during the time of that crime. This perfectly matches my theory, but this seems unlikely because of the cameras, but I’m sure there is at least 1 blind spot, so what I can gain from this is that someone who is trusted, was in the factory decently late, and knows the layout of the cameras is a prime suspect.

“Any ideas on who it could be?” Charlotte asked me, “Nope, none at all” I responded.
“Of course you don’t, well I do. I believe that the worker we asked was lying about the keycard situation” Charlotte says confidently. “What makes you say that?” I questioned.
“Well isn’t it obvious? Why would no one have used their keycard within any hours before the morning, and how do we even know he isn’t the thief, he was quite nervous.” Charlotte said.
“I mean that does make sense, a lot of people when working in a factory such as this would clock in at least a little early, yet no one did.” I said.
 I felt like Charlotte was thinking a little too deep into how someone got in rather than how they got out. While looking around, I notice a bunch of rooms with windows.
“Look at how many windows there are, I am sure we can find someone who could be a witness!” Charlotte said.
“Yeah sure, I can start asking around” I responded, Charlotte ended up asking everyone who lived near the factory if they saw anyone. I decided to text one of my friends about college classes.
“yo Jhona any hard work in psych?” I asked Jhona.
“WTF WHERE HAVE U BEEN” Jhona asks.
“new job nd the hours suck” I responded.
“wild but nah the work in psych is easy rn” Jhona explains.
“u should prolly come to classes anyway your gpa is gonna be horrible” Jhona follows up with.
“i probably cant icl hours are horrible” I responded.
“damn how bad is it” Jhona asks
“opposite of 2018 fort” I responded.
“holy shit bro complain to the boss” Jhona responds.
“boss unknown gng but ill be ight” I say before turning off my phone.

I had no particular leads on this case, but I have an idea.
“Hey I have a question for you, would it be possible for me to see the camera footaged for the last 3 hours of the working day, along with all of the keycard logs for that day?” I asked the worker we questioned. “Yeah sure, but I don’t think it would help you that much” He responded.

While watching the footage, a lot of people walk in and out of the factory during the later hours taking out boxes, this is expected since they do shipping, but one person stuck out to me. Someone with dark brown hair walked in the building 3 times, left only 2, and was the third to clock in this morning, so this clearly means he never clocked out of work and waited until the next day before leaving.

Of course this isn’t enough proof to actually convict him, so now I just need to prove that I’m correct. If I can find a singular strand of hair then that would be more than enough proof, but of course this type of crime won’t be that easy. I'm confident this isn't just 1 rebellious worker, this was an operation being planned for a while. Everything in this was perfect like the amount of workers working overtime, wittnesses, and it was even during a large event.

“I asked around, no one knew anything about the robbery” Charlotte said sadly. “Wow, that sucks. Maybe we could question all of the workers” I responded.
“Great idea, good timing too since all of the employees are in the factory at the moment” Charlotte said.
After questioning just almost everyone, we got practically zero leads, as I expected.

The next person for questioning was a man with dark brown hair and the same cufflink I saw on the cameras.
“Could you please tell me how your entire work day went, along with what you did during lunch?” Charlotte asked the man.
“Of course, I clocked into work at around 7:00, then I did my basic hourly checks on machines until it was my lunch. I started my lunch at 1:00 and left to get something, I came back to eat it, then I left again to throw my trash away. After all of that, I worked until it was closing time then I left. Does that help you?” The man said calmly.
“Yes, thank you.” Charlotte said in a monotone voice. "I also have a few questions. You said you worked until closing time, then you left, but the keycard log doesn't show you leaving at closing time at all." I said causing the can to look a little annoyed. "I walked out with someone else, that's all." he responded with aggression. "Yes, but-" I said before being cut off by charlotte. "I regret to inform you that we do not have enough information to properly convict whoever committed this crime.” Charlotte said formally whilst grabbing my arm, pulling me away from the conversation.

“Hey, can I go do something real quick?” I asked Charlotte, “Yeah, meet at the car when you are done.” Charlotte ordered. I walked to an alleyway with a decently large piece of steel before placing it down and backing away quietly.
“Hey, brown hair, blue cross cufflinks!” I yelled, and the man quickly turned around.
“Oh, hey ace detectiv-” He says before putting away his phone quickly, getting cut off. “Just call me Cid. I am aware that you are the criminal, but even if you confessed now I wouldn’t have enough evidence to convict you because you can just claim it didn't happen. Just know that you did a pretty good job at hiding your tracks, but it wasn’t enough. Maybe an idiot like you shouldn't have taken on this hiest.” I said as I walked off. This clearly got him a angry, perfect.

I heard a piece of steel, so I assumed that a rod was going to be thrown, I was correct. Luckily I was able to avoid being harmed, and that thrown piece of steel I planted was used just as i wanted it to be.

“You really shouldn’t be so loud with attacks, and that also seems like attempted assault. You really did fly too close to the sun” I say as a point towards the alleyway camera.
He was clearly surprised that the alleyway that he used for every phone call had a camera that he didn’t notice.
I was able to detain the man “Robert Johanson” for assault and suspected robbery is still on his record.

While walking back to the car, I realize how hard it's gonna be to pretend that I don't have the capabilty to solve real cases. I can't rely on the other detectives completely, so I need to give small hints to push them in the right direction, but that's assuming they even take what I say into consideration, and I need to do it in a way so they believe it was their idea without any major help from me.

“Do we seriously have to drive all the way back, I’m so tired” I complain.
“You are an ace detective now, you should get used to driving for long periods of time with no breaks” Charlotte responds. "Shouldn't detectives be filing papers and stuff, why can't we just do this online or something?" I ask. "Because then we wouldn't be real detectives, and just so you know, we do solve online cases too" Charlote responds.
I can't believe I spent almost my entire day on some case just to not convict the guy of the proper crime.

Something didn't sit right with me in that case. Robert didn't know that the alleyway had a camera, so does that mean he was unaware. Considering this isn't his grand idea, I doubt that he would do something so foolish. The true boss could've expected for him to be caught, maybe that's why they were speaking over the phone rather than meeting. The real question is where did he put that 3 million dollars worth since he had no possession over it after that day. I have a feeling this case is far from over, but it definitely won't be the main plot of this novel because this is a slice of life.

        let currentNovel = null;
        let currentChapterIndex = 0;

        function renderLibrary() {
            const container = document.getElementById('libraryContainer');
            container.innerHTML = '';

            libraryData.forEach(novel => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-300 rounded-xl overflow-hidden cursor-pointer hover:border-blue-600 hover:shadow-md transition-all";
                card.innerHTML = `
                    <div class="h-64 bg-gray-100 flex items-center justify-center border-b border-gray-200">
                        <div class="text-6xl opacity-40">☄️</div>
                    </div>
                    <div class="p-8">
                        <h3 class="etna-font text-3xl font-semibold tracking-tight mb-6 text-gray-900">${novel.title}</h3>
                        <div class="flex flex-wrap gap-2">
                            ${novel.tags.map(tag => `
                                <span class="px-4 py-1 text-xs rounded-lg bg-gray-100 text-gray-600 border border-gray-200">
                                    ${tag}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
                card.onclick = () => openNovel(novel.id);
                container.appendChild(card);
            });
        }

        function openNovel(novelId) {
            currentNovel = libraryData.find(n => n.id === novelId);
            if (!currentNovel) return;

            document.getElementById('readerScreen').classList.remove('hidden');
            document.getElementById('readerScreen').classList.add('flex');

            document.getElementById('readerNovelTitle').textContent = currentNovel.title;
            
            renderChapterButtons();
            switchChapter(0);
        }

        function renderChapterButtons() {
            const container = document.getElementById('chapterSelector');
            container.innerHTML = '';

            currentNovel.chapters.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = `px-8 py-3 text-sm font-medium rounded-lg border transition-all whitespace-nowrap ${index === 0 ? 
                    'bg-blue-700 text-white border-blue-700' : 
                    'bg-white border-gray-300 text-gray-700 hover:border-blue-600 hover:text-blue-700'}`;
                btn.textContent = chapter.title;
                btn.onclick = () => switchChapter(index);
                container.appendChild(btn);
            });
        }

        function switchChapter(index) {
            if (!currentNovel || index < 0 || index >= currentNovel.chapters.length) return;

            currentChapterIndex = index;
            const chapter = currentNovel.chapters[index];

            document.getElementById('currentChapterNum').textContent = chapter.number;
            document.getElementById('chapterTitle').textContent = chapter.title;

            const formattedContent = chapter.content
                .split('\n\n')
                .map(paragraph => `<p>${paragraph.trim()}</p>`)
                .join('');

            document.getElementById('chapterText').innerHTML = formattedContent;

            // Highlight active button
            document.querySelectorAll('#chapterSelector button').forEach((btn, i) => {
                const isActive = i === index;
                btn.classList.toggle('bg-blue-700', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('border-blue-700', isActive);
                btn.classList.toggle('bg-white', !isActive);
                btn.classList.toggle('border-gray-300', !isActive);
                btn.classList.toggle('text-gray-700', !isActive);
            });
        }

        function prevChapter() {
            if (currentChapterIndex > 0) switchChapter(currentChapterIndex - 1);
        }

        function nextChapter() {
            if (currentChapterIndex < currentNovel.chapters.length - 1) {
                switchChapter(currentChapterIndex + 1);
            } else {
                alert("You've reached the end of this novel.");
            }
        }

        function closeReader() {
            const reader = document.getElementById('readerScreen');
            reader.classList.add('hidden');
            reader.classList.remove('flex');
        }

        document.addEventListener('keydown', e => {
            if (e.key === "Escape") closeReader();
        });

        // Initialize
        renderLibrary();
    </script>
